services:
  postgres:
    image: postgres:16-alpine
    container_name: kfc_postgres
    environment:
      POSTGRES_DB: kfc_forecast
      POSTGRES_USER: kfc_user
      POSTGRES_PASSWORD: kfc_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kfc_user -d kfc_forecast"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kfc_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: kfc_forecast
      DB_USER: kfc_user
      DB_PASSWORD: kfc_password
      CONFIG_PATH: /app/config/config.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kfc_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
